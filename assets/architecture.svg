<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 470" width="1200" height="470" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" role="img" aria-label="LLM Hunter architecture">
  <defs>
    <marker id="arw" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#93a1b2"/></marker>
    <marker id="arwd" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#7d8aa0"/></marker>
  </defs>

  <rect x="0" y="0" width="1200" height="470" rx="16" fill="#0c0f14" stroke="#28313e"/>

  <!-- ===== INTAKE ROW ===== -->
  <g>
    <rect x="40" y="26" width="160" height="50" rx="9" fill="#0d2233" stroke="#5b8def"/>
    <text x="120" y="47" text-anchor="middle" fill="#e7eef6" font-size="14" font-weight="600">pentest-intake</text>
    <text x="120" y="63" text-anchor="middle" fill="#93a1b2" font-size="11">legitimacy gate + config</text>
    <line x1="200" y1="51" x2="226" y2="51" stroke="#93a1b2" stroke-width="2" marker-end="url(#arw)"/>
    <rect x="228" y="26" width="140" height="50" rx="9" fill="#0d2233" stroke="#5b8def"/>
    <text x="298" y="55" text-anchor="middle" fill="#e7eef6" font-size="14" font-weight="600">scope-analyst</text>
    <line x1="368" y1="51" x2="394" y2="51" stroke="#93a1b2" stroke-width="2" marker-end="url(#arw)"/>
    <rect x="396" y="26" width="226" height="50" rx="9" fill="#0d2233" stroke="#5b8def" stroke-width="2"/>
    <text x="509" y="47" text-anchor="middle" fill="#e7eef6" font-size="15" font-weight="700">rules.yaml</text>
    <text x="509" y="63" text-anchor="middle" fill="#93a1b2" font-size="11">the only guardrail · injected to all</text>
  </g>
  <line x1="509" y1="76" x2="420" y2="176" stroke="#93a1b2" stroke-width="2" marker-end="url(#arw)"/>

  <!-- ===== MAIN LOOP ===== -->
  <rect x="24" y="106" width="796" height="230" rx="14" fill="none" stroke="#28313e"/>
  <text x="38" y="126" fill="#6b7889" font-size="11" letter-spacing="2" font-family="ui-monospace, monospace">MAIN LOOP</text>

  <!-- Recon column -->
  <g>
    <rect x="46" y="150" width="222" height="38" rx="8" fill="#10240f" stroke="#41c471"/>
    <text x="157" y="167" text-anchor="middle" fill="#e7eef6" font-size="12.5">N tool-agents</text>
    <text x="157" y="181" text-anchor="middle" fill="#93a1b2" font-size="10.5">1 per authorized tool (inclusive)</text>
    <rect x="46" y="196" width="222" height="34" rx="8" fill="#10240f" stroke="#41c471"/>
    <text x="157" y="217" text-anchor="middle" fill="#e7eef6" font-size="12.5">⌈N/5⌉ orchestrators</text>
    <rect x="46" y="238" width="222" height="34" rx="8" fill="#153a1c" stroke="#41c471"/>
    <text x="157" y="259" text-anchor="middle" fill="#e7eef6" font-size="12.5" font-weight="600">master-recon</text>
  </g>

  <!-- Principal hub -->
  <rect x="312" y="182" width="176" height="92" rx="12" fill="#2a1618" stroke="#f2604f" stroke-width="2"/>
  <text x="400" y="216" text-anchor="middle" fill="#e7eef6" font-size="12.5">Super-Agent</text>
  <text x="400" y="235" text-anchor="middle" fill="#e7eef6" font-size="15" font-weight="700">Principal</text>
  <text x="400" y="255" text-anchor="middle" fill="#93a1b2" font-size="11">drives Recon ⇄ Attack</text>

  <!-- Attack column -->
  <g>
    <rect x="532" y="146" width="220" height="34" rx="8" fill="#10240f" stroke="#41c471"/>
    <text x="642" y="167" text-anchor="middle" fill="#e7eef6" font-size="12.5">N tool-agents</text>
    <rect x="532" y="186" width="220" height="34" rx="8" fill="#10240f" stroke="#41c471"/>
    <text x="642" y="207" text-anchor="middle" fill="#e7eef6" font-size="12.5">⌈N/5⌉ orchestrators</text>
    <rect x="532" y="226" width="220" height="34" rx="8" fill="#153a1c" stroke="#41c471"/>
    <text x="642" y="247" text-anchor="middle" fill="#e7eef6" font-size="12.5" font-weight="600">master-attack</text>
    <rect x="532" y="266" width="220" height="38" rx="8" fill="#122b2d" stroke="#38c6cf"/>
    <text x="642" y="283" text-anchor="middle" fill="#e7eef6" font-size="12.5" font-weight="600">🛡 persistence-controller</text>
    <text x="642" y="297" text-anchor="middle" fill="#38c6cf" font-size="10.5">retry with a new angle until exhausted / budget</text>
  </g>

  <!-- main-loop arrows -->
  <line x1="268" y1="255" x2="310" y2="240" stroke="#93a1b2" stroke-width="2" marker-end="url(#arw)"/>
  <line x1="488" y1="230" x2="530" y2="215" stroke="#93a1b2" stroke-width="2" marker-end="url(#arw)"/>
  <line x1="640" y1="266" x2="470" y2="256" stroke="#7d8aa0" stroke-width="1.6" marker-end="url(#arw)"/>

  <!-- ===== CREATIVE POOL ===== -->
  <rect x="24" y="352" width="592" height="100" rx="14" fill="none" stroke="#e0a13a"/>
  <text x="38" y="372" fill="#e0a13a" font-size="11" letter-spacing="1.5" font-family="ui-monospace, monospace">CREATIVE POOL — FIREWALLED · RAW SURFACE ONLY</text>
  <rect x="42" y="386" width="164" height="48" rx="8" fill="#2a2210" stroke="#e0a13a"/>
  <text x="124" y="406" text-anchor="middle" fill="#e7eef6" font-size="12.5">🎲 crazy agents</text>
  <text x="124" y="421" text-anchor="middle" fill="#93a1b2" font-size="10.5">no memory of prior work</text>
  <line x1="206" y1="410" x2="230" y2="410" stroke="#93a1b2" stroke-width="2" marker-end="url(#arw)"/>
  <rect x="232" y="386" width="150" height="48" rx="8" fill="#2a2210" stroke="#e0a13a"/>
  <text x="307" y="414" text-anchor="middle" fill="#e7eef6" font-size="12.5">crazy recon → attack</text>
  <line x1="382" y1="410" x2="406" y2="410" stroke="#93a1b2" stroke-width="2" marker-end="url(#arw)"/>
  <rect x="408" y="386" width="190" height="48" rx="8" fill="#2a2210" stroke="#e0a13a"/>
  <text x="503" y="406" text-anchor="middle" fill="#e7eef6" font-size="12.5">crazy master</text>
  <text x="503" y="421" text-anchor="middle" fill="#93a1b2" font-size="10.5">→ 🛡 persistence (retry until exhausted)</text>

  <!-- firewall feed (dotted) -->
  <line x1="240" y1="336" x2="150" y2="384" stroke="#7d8aa0" stroke-width="1.6" stroke-dasharray="4 4" marker-end="url(#arwd)"/>
  <text x="150" y="360" text-anchor="middle" fill="#7d8aa0" font-size="10">raw surface only</text>

  <!-- ===== GLOBAL ===== -->
  <rect x="636" y="360" width="184" height="84" rx="12" fill="#2a1618" stroke="#f2604f" stroke-width="2"/>
  <text x="728" y="392" text-anchor="middle" fill="#e7eef6" font-size="12.5">Super-Agent</text>
  <text x="728" y="411" text-anchor="middle" fill="#e7eef6" font-size="15" font-weight="700">Global</text>
  <text x="728" y="429" text-anchor="middle" fill="#93a1b2" font-size="10.5">correlates creative ⇄ main</text>
  <line x1="598" y1="410" x2="634" y2="404" stroke="#93a1b2" stroke-width="2" marker-end="url(#arw)"/>
  <line x1="712" y1="360" x2="480" y2="276" stroke="#7d8aa0" stroke-width="1.6" marker-end="url(#arw)"/>

  <!-- ===== LEARNING PANEL ===== -->
  <rect x="840" y="106" width="336" height="338" rx="14" fill="#160f24" stroke="#a884f0"/>
  <text x="858" y="130" fill="#a884f0" font-size="11" letter-spacing="1.5" font-family="ui-monospace, monospace">SELF-LEARNING LOOP</text>
  <rect x="866" y="148" width="284" height="52" rx="9" fill="#241a38" stroke="#a884f0"/>
  <text x="1008" y="170" text-anchor="middle" fill="#e7eef6" font-size="12.5">any agent → inbox</text>
  <text x="1008" y="186" text-anchor="middle" fill="#93a1b2" font-size="10.5">raw capture (draft OK) + notify</text>
  <line x1="1008" y1="200" x2="1008" y2="224" stroke="#a884f0" stroke-width="2" marker-end="url(#arw)"/>
  <rect x="866" y="226" width="284" height="46" rx="9" fill="#241a38" stroke="#a884f0"/>
  <text x="1008" y="254" text-anchor="middle" fill="#e7eef6" font-size="12.5" font-weight="600">skill-writer</text>
  <line x1="1008" y1="272" x2="1008" y2="296" stroke="#a884f0" stroke-width="2" marker-end="url(#arw)"/>
  <rect x="866" y="298" width="284" height="46" rx="9" fill="#241a38" stroke="#a884f0"/>
  <text x="1008" y="326" text-anchor="middle" fill="#e7eef6" font-size="12.5" font-weight="600">skills/learned/</text>
  <text x="1008" y="372" text-anchor="middle" fill="#93a1b2" font-size="11">read before executing · base runs immutable</text>

  <!-- learning links (dotted) -->
  <line x1="820" y1="200" x2="864" y2="180" stroke="#7d8aa0" stroke-width="1.6" stroke-dasharray="4 4" marker-end="url(#arwd)"/>
  <text x="835" y="205" text-anchor="middle" fill="#7d8aa0" font-size="10">discoveries</text>
</svg>
