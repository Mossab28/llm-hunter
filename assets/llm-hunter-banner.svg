<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360" font-family="'Courier New', ui-monospace, monospace" role="img" aria-label="LLM Hunter — pentest and bug bounty engine">
  <defs>
    <linearGradient id="space" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#05070d"/>
      <stop offset="0.55" stop-color="#0a1320"/>
      <stop offset="1" stop-color="#0f0a1c"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2de1c2"/>
      <stop offset="0.5" stop-color="#7cf6ff"/>
      <stop offset="1" stop-color="#b98cff"/>
    </linearGradient>
    <radialGradient id="planet" cx="0.35" cy="0.35" r="0.8">
      <stop offset="0" stop-color="#8f7bff"/>
      <stop offset="0.6" stop-color="#4a3aa8"/>
      <stop offset="1" stop-color="#180f38"/>
    </radialGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="34"/>
    </filter>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <filter id="eyeglow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <!-- space -->
  <rect width="1200" height="360" fill="url(#space)"/>
  <!-- nebula glows -->
  <ellipse cx="300" cy="300" rx="260" ry="120" fill="#137a6b" opacity="0.22" filter="url(#soft)"/>
  <ellipse cx="980" cy="70" rx="240" ry="140" fill="#5b3aa0" opacity="0.22" filter="url(#soft)"/>

  <!-- stars -->
  <g fill="#dbe8ff" shape-rendering="crispEdges">
    <rect x="60" y="40" width="2" height="2"/><rect x="140" y="90" width="2" height="2"/>
    <rect x="220" y="30" width="3" height="3"/><rect x="330" y="70" width="2" height="2"/>
    <rect x="500" y="40" width="2" height="2"/><rect x="620" y="80" width="3" height="3"/>
    <rect x="700" y="35" width="2" height="2"/><rect x="820" y="60" width="2" height="2"/>
    <rect x="900" y="30" width="2" height="2"/><rect x="1130" y="55" width="2" height="2"/>
    <rect x="40" y="180" width="2" height="2"/><rect x="120" y="250" width="3" height="3"/>
    <rect x="70" y="320" width="2" height="2"/><rect x="260" y="300" width="2" height="2"/>
    <rect x="470" y="300" width="2" height="2"/><rect x="560" y="330" width="3" height="3"/>
    <rect x="690" y="290" width="2" height="2"/><rect x="780" y="320" width="2" height="2"/>
    <rect x="880" y="280" width="2" height="2"/><rect x="1000" y="300" width="3" height="3"/>
    <rect x="1090" y="250" width="2" height="2"/><rect x="1150" y="320" width="2" height="2"/>
    <rect x="410" y="140" width="2" height="2"/><rect x="1060" y="180" width="2" height="2"/>
  </g>
  <g fill="#7cf6ff" shape-rendering="crispEdges">
    <rect x="180" y="150" width="3" height="3"/><rect x="540" y="120" width="3" height="3"/>
    <rect x="1010" y="230" width="3" height="3"/><rect x="360" y="330" width="3" height="3"/>
  </g>

  <!-- planet -->
  <circle cx="1055" cy="92" r="52" fill="url(#planet)"/>
  <ellipse cx="1055" cy="92" rx="86" ry="22" fill="none" stroke="#7cf6ff" stroke-opacity="0.55" stroke-width="3" transform="rotate(-22 1055 92)"/>
  <ellipse cx="1055" cy="92" rx="86" ry="22" fill="none" stroke="#b98cff" stroke-opacity="0.35" stroke-width="6" transform="rotate(-22 1055 92)"/>

  <!-- pixel hooded figure -->
  <g transform="translate(96,86)" shape-rendering="crispEdges">
    <!-- eye glow behind -->
    <g filter="url(#eyeglow)" fill="#9bfcff">
      <rect x="48" y="72" width="24" height="12"/><rect x="96" y="72" width="24" height="12"/>
    </g>
    <!-- hood outline (H=#2de1c2), inner dark (d=#123a45), face (f=#070a10), eyes (e=#9bfcff), cloak (C=#1f6b7a, c=#0c2a33) -->
    <g fill="#2de1c2">
      <rect x="60" y="0" width="48" height="12"/>
      <rect x="36" y="12" width="24" height="12"/><rect x="108" y="12" width="24" height="12"/>
      <rect x="24" y="24" width="12" height="12"/><rect x="132" y="24" width="12" height="12"/>
      <rect x="12" y="36" width="12" height="12"/><rect x="144" y="36" width="12" height="12"/>
      <rect x="12" y="48" width="12" height="12"/><rect x="144" y="48" width="12" height="12"/>
      <rect x="12" y="60" width="12" height="12"/><rect x="144" y="60" width="12" height="12"/>
      <rect x="12" y="72" width="12" height="12"/><rect x="144" y="72" width="12" height="12"/>
      <rect x="12" y="84" width="12" height="12"/><rect x="144" y="84" width="12" height="12"/>
      <rect x="24" y="96" width="12" height="12"/><rect x="132" y="96" width="12" height="12"/>
      <rect x="36" y="108" width="12" height="12"/><rect x="120" y="108" width="12" height="12"/>
    </g>
    <g fill="#123a45">
      <rect x="60" y="12" width="48" height="12"/>
      <rect x="36" y="24" width="96" height="12"/>
      <rect x="24" y="36" width="120" height="12"/>
      <rect x="24" y="48" width="24" height="12"/><rect x="120" y="48" width="24" height="12"/>
      <rect x="24" y="60" width="24" height="12"/><rect x="120" y="60" width="24" height="12"/>
      <rect x="24" y="72" width="24" height="12"/><rect x="120" y="72" width="24" height="12"/>
      <rect x="24" y="84" width="24" height="12"/><rect x="120" y="84" width="24" height="12"/>
      <rect x="36" y="96" width="24" height="12"/><rect x="108" y="96" width="24" height="12"/>
      <rect x="48" y="108" width="72" height="12"/>
    </g>
    <g fill="#070a10">
      <rect x="48" y="48" width="72" height="12"/>
      <rect x="48" y="60" width="72" height="12"/>
      <rect x="48" y="72" width="24" height="12"/><rect x="96" y="72" width="24" height="12"/>
      <rect x="72" y="72" width="24" height="12"/>
      <rect x="48" y="84" width="72" height="12"/>
      <rect x="60" y="96" width="48" height="12"/>
    </g>
    <g fill="#9bfcff">
      <rect x="48" y="72" width="24" height="12"/><rect x="96" y="72" width="24" height="12"/>
    </g>
    <g fill="#1f6b7a">
      <rect x="36" y="120" width="96" height="12"/>
      <rect x="24" y="132" width="12" height="12"/><rect x="132" y="132" width="12" height="12"/>
      <rect x="12" y="144" width="12" height="12"/><rect x="144" y="144" width="12" height="12"/>
      <rect x="12" y="156" width="12" height="12"/><rect x="144" y="156" width="12" height="12"/>
      <rect x="12" y="168" width="12" height="12"/><rect x="144" y="168" width="12" height="12"/>
      <rect x="12" y="180" width="144" height="12"/>
    </g>
    <g fill="#0c2a33">
      <rect x="36" y="132" width="96" height="12"/>
      <rect x="24" y="144" width="120" height="12"/>
      <rect x="24" y="156" width="120" height="12"/>
      <rect x="24" y="168" width="120" height="12"/>
    </g>
  </g>

  <!-- title -->
  <g>
    <text x="356" y="196" font-size="82" font-weight="bold" letter-spacing="4" fill="#2de1c2" opacity="0.85" filter="url(#glow)">LLM HUNTER</text>
    <text x="356" y="196" font-size="82" font-weight="bold" letter-spacing="4" fill="url(#title)">LLM HUNTER</text>
  </g>
  <text x="360" y="238" font-size="19" letter-spacing="6" fill="#8fb6c4">// PENTEST · BUG BOUNTY · SELF-LEARNING ENGINE</text>
  <text x="360" y="270" font-size="14" letter-spacing="3" fill="#5f7c8a">SCOPE IS THE ONLY GUARDRAIL — LLM-AGNOSTIC</text>
</svg>
